apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata:
  name: {{ .Values.app_name }}-{{ .Values.environment }}
  namespace: demo
spec:
  replicas: {{ .Values.replicas }}
  selector:
    matchLabels:
      app: {{ .Values.app_name }}
  strategy:
    canary:
      steps:
      - setWeight: 20
      - pause: {}
      - setWeight: 40
      - pause: {duration: 10}
      - setWeight: 60
      - pause: {duration: 10}
      - setWeight: 80
      - pause: {duration: 10}
  template:
    metadata:
      labels:
        app: {{ .Values.app_name }}
    spec:
      containers:
        - name: {{ .Values.app_name }}
          image: hashicorp/http-echo:{{ .Values.image_version }}
          args:
            - "-text={{ .Values.echo_text }}"
            - "-listen=:{{ .Values.container_port }}"
          ports:
            - containerPort: {{ .Values.container_port }}
              name: http