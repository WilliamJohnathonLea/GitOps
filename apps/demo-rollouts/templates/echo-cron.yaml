apiVersion: batch/v1
kind: CronJob
metadata:
  name: hello
  namespace: demo
spec:
  schedule: "* * * * *"
  jobTemplate:
    spec:
      template:
        spec:
          containers:
          - name: hello
            image: busybox:1.28
            imagePullPolicy: IfNotPresent
            command:
            - /bin/sh
            - -c
            - curl http://{{ .Values.app_name }}-{{ .Values.environment }}
          restartPolicy: OnFailure
