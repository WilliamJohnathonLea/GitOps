apiVersion: batch/v1
kind: CronJob
metadata:
  name: ping-{{ .Values.app_name }}-{{ .Values.environment }}
  namespace: demo
spec:
  schedule: "* * * * *"   # Every minute
  jobTemplate:
    spec:
      template:
        spec:
          restartPolicy: Never
          containers:
          - name: curl
            image: curlimages/curl:8.8.0
            args:
              - "-f" # Fail on HTTP >= 400
              - "http://{{ .Values.app_name }}-{{ .Values.environment }}/"