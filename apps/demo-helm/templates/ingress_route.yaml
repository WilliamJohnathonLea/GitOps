apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: {{ .Values.app_name }}-{{ .Values.environment }}
  namespace: demo
spec:
  entryPoints:
    - web
  routes:
    - match: Host(`{{ .Values.app_name }}-{{ .Values.environment }}.localhost`)
      kind: Rule
      services:
        - name: {{ .Values.app_name }}-{{ .Values.environment }}
          port: 80