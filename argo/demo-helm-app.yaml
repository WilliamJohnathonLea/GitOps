apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: demo-helm-app
  namespace: argocd
spec:
  generators:
    - list:
        elements:
          - environment: dev
          - environment: qa
  template:
    metadata:
      name: demo-helm-app
      namespace: argocd
      finalizers:
        - resources-finalizer.argocd.argoproj.io
    spec:
      project: demo-project
      source:
        repoURL: https://github.com/WilliamJohnathonLea/GitOps.git
        targetRevision: master
        path: apps/demo-helm
        helm:
          releaseName: demo-helm
          valueFiles: # Add overrides here
            - "{{environment}}.yaml"
      destination:
        server: https://kubernetes.default.svc
        namespace: demo
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true